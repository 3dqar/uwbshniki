<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Profilis — Econ Empire</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#6366f1"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="apple-touch-icon" href="assets/icon-192.png"/>
  <link rel="icon" href="assets/favicon.ico" sizes="any"/>
  <link rel="stylesheet" href="assets/css/app.css"/>
  <style>
    .profile-hero { text-align: center; padding: 28px 20px 24px; }
    .profile-avatar-wrap { position: relative; display: inline-block; margin-bottom: 16px; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--gold-dim) 0%, var(--purple-dim) 100%); border: 2px solid var(--border-gold); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: var(--gold); text-transform: uppercase; box-shadow: 0 0 28px rgba(245,200,66,0.2); }
    .profile-level-ring { position: absolute; inset: -4px; border-radius: 50%; border: 2px solid transparent; background: linear-gradient(135deg, var(--gold), var(--purple-2)) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude; }
    .profile-username { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
    .profile-biz-title { font-size: 13px; color: var(--text-2); margin-bottom: 12px; }
    .profile-badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .profile-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card-p { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 18px 16px; }
    .scp-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
    .scp-val   { font-size: 22px; font-weight: 800; font-family: var(--font-mono); }
    .scp-sub   { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .scp--coins { border-color: rgba(245,200,66,0.2); } .scp--coins .scp-val { color: var(--gold); }
    .scp--xp    { border-color: rgba(123,79,255,0.2); } .scp--xp .scp-val    { color: var(--purple-2); }
    .scp--biz   { border-color: rgba(0,212,170,0.2); }  .scp--biz .scp-val   { font-size: 15px; color: var(--teal); }
    .scp--lvl   { border-color: rgba(255,140,66,0.2); } .scp--lvl .scp-val   { color: var(--orange); }

    .prog-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 18px 16px; margin-bottom: 20px; }
    .prog-row2 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .prog-title2 { font-size: 13px; font-weight: 700; }
    .prog-pct2   { font-size: 12px; font-weight: 700; font-family: var(--font-mono); color: var(--purple-2); }

    .achievements { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .ach-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px 10px; text-align: center; transition: border-color 0.2s; }
    .ach-item.earned { border-color: var(--border-gold); background: var(--gold-glow); }
    .ach-emoji { font-size: 24px; margin-bottom: 6px; }
    .ach-name  { font-size: 10px; font-weight: 700; color: var(--text-2); line-height: 1.3; }
    .ach-item:not(.earned) { opacity: 0.4; }

    .logout-btn { width: 100%; padding: 16px; border-radius: var(--r-md); background: transparent; border: 1px solid rgba(255,77,106,0.3); color: var(--red); font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--font-ui); transition: background 0.2s, box-shadow 0.2s; }
    .logout-btn:hover { background: var(--red-dim); box-shadow: 0 4px 16px rgba(255,77,106,0.15); }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-root">
    <header class="top-bar">
      <span class="top-bar__logo">Profilis</span>
      <div></div>
    </header>
    <main class="page-content">
      <div class="profile-hero">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="p-avatar">?</div>
          <div class="profile-level-ring"></div>
        </div>
        <div class="profile-username" id="p-username">–</div>
        <div class="profile-biz-title" id="p-biz-title">–</div>
        <div class="profile-badges" id="p-badges"></div>
      </div>

      <div class="stats-grid">
        <div class="stat-card-p scp--coins"><div class="scp-label">Kapitalas</div><div class="scp-val" id="p-coins">€0</div><div class="scp-sub">Pinigai</div></div>
        <div class="stat-card-p scp--xp"><div class="scp-label">Žinios</div><div class="scp-val" id="p-xp">0</div><div class="scp-sub">XP taškai</div></div>
        <div class="stat-card-p scp--biz"><div class="scp-label">Verslas</div><div class="scp-val" id="p-biz">–</div><div class="scp-sub">Dabartinis</div></div>
        <div class="stat-card-p scp--lvl"><div class="scp-label">Verslo lygis</div><div class="scp-val" id="p-level">1</div><div class="scp-sub">Lygis</div></div>
      </div>

      <div class="prog-card">
        <div class="prog-row2">
          <span class="prog-title2">Progresas iki kito lygio</span>
          <span class="prog-pct2" id="p-prog-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-bar__fill progress-bar__fill--gold" id="p-prog-bar" style="width:0%"></div></div>
        <div style="font-size:11px;color:var(--text-3);margin-top:8px;" id="p-prog-sub">0 / 500 XP</div>
      </div>

      <p class="section-label mb-12">Pasiekimai</p>
      <div class="achievements" id="achievements"></div>

      <button class="logout-btn" id="logout-btn">↩ Atsijungti</button>
    </main>
    <nav class="bottom-nav">
      <a class="nav-item" data-page="app" href="app.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a class="nav-item" data-page="empire" href="empire.html"><svg viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l7-4 7 4v14"/><path d="M9 21v-4h6v4"/></svg>Imperija</a>
      <a class="nav-item" data-page="market" href="market.html"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>Rinka</a>
      <a class="nav-item" data-page="academy" href="academy.html"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Akademija</a>
      <a class="nav-item" data-page="leaderboard" href="leaderboard.html"><svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>Top</a>
    </nav>
  </div>
  <script type="module">
    import { getUser, requireAuth, clearUser, getLevelInfo } from './assets/js/user.js';
    import { fmt, countUp } from './assets/js/ui.js';

    requireAuth();
    const u    = getUser();
    const info = getLevelInfo(u.xp || 0);

    document.getElementById('p-avatar').textContent    = u.username[0].toUpperCase();
    document.getElementById('p-username').textContent  = u.username;
    document.getElementById('p-biz-title').textContent = `${info.business.emoji} ${info.business.name}`;
    document.getElementById('p-biz').textContent       = info.business.emoji + ' ' + info.business.name;
    document.getElementById('p-level').textContent     = info.level;
    document.getElementById('p-prog-pct').textContent  = Math.round(info.progress * 100) + '%';
    document.getElementById('p-prog-bar').style.width  = (info.progress * 100) + '%';
    document.getElementById('p-prog-sub').textContent  = `${info.current} / ${info.needed} XP`;

    setTimeout(() => {
      countUp(document.getElementById('p-coins'), u.coins || 0, 800, '€');
      countUp(document.getElementById('p-xp'), u.xp || 0, 700);
    }, 100);

    // Badges
    const badges = [];
    if ((u.coins || 0) >= 100)  badges.push({ label: '💰 Kapitalistė', col: 'var(--gold-dim)', txt: 'var(--gold)' });
    if ((u.xp || 0) >= 200)     badges.push({ label: '🎓 Studentas', col: 'var(--purple-dim)', txt: 'var(--purple-2)' });
    if (info.level >= 3)         badges.push({ label: '⭐ Verslovas', col: 'var(--teal-dim)', txt: 'var(--teal)' });
    const badgeEl = document.getElementById('p-badges');
    badges.forEach(b => {
      const el = document.createElement('div');
      el.className = 'profile-badge';
      el.style.cssText = `background:${b.col};color:${b.txt};`;
      el.textContent = b.label;
      badgeEl.appendChild(el);
    });

    // Achievements
    const ACHS = [
      { emoji: '🚀', name: 'Pirmas žingsnis', req: () => true },
      { emoji: '💰', name: '€1000 Kapitalo', req: () => (u.coins || 0) >= 1000 },
      { emoji: '🎓', name: '100 Žinių', req: () => (u.xp || 0) >= 100 },
      { emoji: '🏪', name: 'Parduotuvė', req: () => info.level >= 3 },
      { emoji: '🏭', name: 'Gamykla', req: () => info.level >= 4 },
      { emoji: '👑', name: 'Imperatorius', req: () => info.level >= 8 },
    ];
    const achEl = document.getElementById('achievements');
    ACHS.forEach(a => {
      const div = document.createElement('div');
      div.className = 'ach-item' + (a.req() ? ' earned' : '');
      div.innerHTML = `<div class="ach-emoji">${a.emoji}</div><div class="ach-name">${a.name}</div>`;
      achEl.appendChild(div);
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      clearUser();
      window.location.href = 'index.html';
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
